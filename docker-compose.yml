# START_MODULE_CONTRACT
# PURPOSE: Define the local Kodex Phase 0 development stack with hot reload and health-gated startup.
# SCOPE: PostgreSQL, MinIO, backend, and frontend orchestration for local development.
# DEPENDS: .env, ../kodex-backend, ../kodex-frontend
# LINKS: M-INFRA-COMPOSE, M-INFRA-ENV, M-DB, M-S3, M-APP, M-FE-APP
# END_MODULE_CONTRACT
# START_MODULE_MAP
# db - PostgreSQL 16 service with external bind mount and healthcheck
# s3 - MinIO S3-compatible object storage with external bind mount
# backend - FastAPI reload service gated on database and storage readiness
# frontend - Vite development server mounted to the frontend repository
# END_MODULE_MAP
services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  s3:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data

  backend:
    build:
      context: ../kodex-backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ../kodex-backend:/app
    depends_on:
      db:
        condition: service_healthy
      s3:
        condition: service_started

  frontend:
    build:
      context: ../kodex-frontend
      dockerfile: Dockerfile
    command: vite --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ../kodex-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
